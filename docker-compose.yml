services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_web}
      POSTGRES_USER: ${POSTGRES_USER:-ai_web}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_web_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_web} -d ${POSTGRES_DB:-ai_web}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ai_web:ai_web_password@postgres:5432/ai_web}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MAX_TEXT_LENGTH: ${MAX_TEXT_LENGTH:-4000}
      MAX_TOKENS: ${MAX_TOKENS:-256}
    volumes:
      - model_cache:/app/model_cache
    networks:
      - frontend_net
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000/api}
    networks:
      - frontend_net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend_net
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_healthy

networks:
  frontend_net:
  backend_net:
    internal: true

volumes:
  postgres_data:
  redis_data:
  model_cache:
